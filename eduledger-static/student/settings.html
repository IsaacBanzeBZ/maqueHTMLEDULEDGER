<!DOCTYPE html>
<html lang="fr" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paramètres — EduLedger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/main.css" />
    <link rel="stylesheet" href="../assets/css/components.css" />
    <link rel="stylesheet" href="../assets/css/layout.css" />
    <style>
        .page-inner {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            padding: 1.5rem
        }

        .settings-tabs {
            display: flex;
            gap: 0;
            border-bottom: 2px solid var(--clr-border)
        }

        .stab {
            padding: .6rem 1.25rem;
            font-size: .875rem;
            font-weight: 500;
            border: none;
            background: none;
            cursor: pointer;
            color: var(--clr-muted-fg);
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: color .15s, border-color .15s
        }

        .stab.active {
            color: var(--clr-primary);
            border-bottom-color: var(--clr-primary)
        }

        .stab-panel {
            display: none
        }

        .stab-panel.active {
            display: block
        }

        .settings-section {
            padding: 1.5rem
        }

        .settings-section+.settings-section {
            border-top: 1px solid var(--clr-border)
        }

        .settings-section-title {
            font-weight: 600;
            font-size: .9375rem;
            margin-bottom: 1rem
        }
    </style>
</head>

<body>
    <svg style="display:none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
            <symbol id="ic-dashboard" viewBox="0 0 24 24">
                <rect width="7" height="9" x="3" y="3" rx="1" />
                <rect width="7" height="5" x="14" y="3" rx="1" />
                <rect width="7" height="9" x="14" y="12" rx="1" />
                <rect width="7" height="5" x="3" y="16" rx="1" />
            </symbol>
            <symbol id="ic-file-text" viewBox="0 0 24 24">
                <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
            </symbol>
            <symbol id="ic-trend" viewBox="0 0 24 24">
                <polyline points="22 7 13.5 15.5 8.5 10.5 2 17" />
                <polyline points="16 7 22 7 22 13" />
            </symbol>
            <symbol id="ic-history" viewBox="0 0 24 24">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                <path d="M3 3v5h5" />
                <path d="M12 7v5l4 2" />
            </symbol>
            <symbol id="ic-settings" viewBox="0 0 24 24">
                <path
                    d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
                <circle cx="12" cy="12" r="3" />
            </symbol>
            <symbol id="ic-logout" viewBox="0 0 24 24">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <polyline points="16 17 21 12 16 7" />
                <line x1="21" y1="12" x2="9" y2="12" />
            </symbol>
            <symbol id="ic-sun" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="4" />
                <path
                    d="M12 2v2M12 20v2m-7.07-14.07 1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2m-4.93-7.07-1.41 1.41M6.34 17.66l-1.41 1.41" />
            </symbol>
            <symbol id="ic-moon" viewBox="0 0 24 24">
                <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
            </symbol>
            <symbol id="ic-menu" viewBox="0 0 24 24">
                <line x1="4" y1="12" x2="20" y2="12" />
                <line x1="4" y1="6" x2="20" y2="6" />
                <line x1="4" y1="18" x2="20" y2="18" />
            </symbol>
            <symbol id="ic-eye" viewBox="0 0 24 24">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z" />
                <circle cx="12" cy="12" r="3" />
            </symbol>
        </defs>
    </svg>

    <div class="app">
        <aside class="sidebar" id="sidebar" aria-label="Navigation étudiant">
            <div class="sidebar-header"><a class="sidebar-brand" href="dashboard.html">
                    <div class="sidebar-logo" style="background:var(--clr-accent)">E</div><span
                        class="sidebar-brand-name">EduLedger</span>
                </a></div>
            <nav class="sidebar-nav">
                <div class="nav-group">
                    <p class="nav-group-label">Mon espace</p>
                    <a class="nav-link" href="dashboard.html"><svg class="icon" aria-hidden="true">
                            <use href="#ic-dashboard" />
                        </svg><span class="nav-label">Tableau de bord</span></a>
                    <a class="nav-link" href="results.html"><svg class="icon" aria-hidden="true">
                            <use href="#ic-file-text" />
                        </svg><span class="nav-label">Mes résultats</span></a>
                    <a class="nav-link" href="performance.html"><svg class="icon" aria-hidden="true">
                            <use href="#ic-trend" />
                        </svg><span class="nav-label">Ma progression</span></a>
                    <a class="nav-link" href="history.html"><svg class="icon" aria-hidden="true">
                            <use href="#ic-history" />
                        </svg><span class="nav-label">Historique</span></a>
                </div>
                <div class="nav-group">
                    <p class="nav-group-label">Compte</p>
                    <a class="nav-link active" href="settings.html" aria-current="page"><svg class="icon"
                            aria-hidden="true">
                            <use href="#ic-settings" />
                        </svg><span class="nav-label">Paramètres</span></a>
                </div>
            </nav>
            <div class="sidebar-footer"><a class="nav-link" href="../login/"><svg class="icon"
                        aria-hidden="true">
                        <use href="#ic-logout" />
                    </svg><span class="nav-label">Déconnexion</span></a></div>
        </aside>
        <div id="mobileOverlay" class="mobile-overlay"></div>

        <div class="main-area">
            <header class="app-header">
                <button class="btn-icon" id="sidebarToggle" aria-label="Réduire la navigation"><svg class="icon"
                        style="font-size:1.125rem" aria-hidden="true">
                        <use href="#ic-menu" />
                    </svg></button>
                <nav aria-label="Fil d'ariane" style="font-size:0.8125rem;color:var(--clr-muted-fg)"><span
                        style="color:var(--clr-fg);font-weight:500">Paramètres</span></nav>
                <div class="header-actions">
                    <button class="btn-icon theme-toggle" id="themeToggle" aria-label="Basculer le thème">
                        <svg class="icon icon-sun" style="font-size:1.125rem" aria-hidden="true">
                            <use href="#ic-sun" />
                        </svg>
                        <svg class="icon icon-moon" style="font-size:1.125rem" aria-hidden="true">
                            <use href="#ic-moon" />
                        </svg>
                    </button>
                </div>
            </header>

            <main class="content">
                <div class="page-inner">
                    <div>
                        <h1 style="font-size:1.5rem;font-weight:700;letter-spacing:-0.02em">Paramètres</h1>
                        <p style="font-size:0.875rem;color:var(--clr-muted-fg);margin-top:0.25rem">Gérer vos
                            informations et préférences</p>
                    </div>

                    <section class="card">
                        <div class="settings-tabs" role="tablist">
                            <button class="stab active" role="tab" data-tab="profil"
                                aria-selected="true">Profil</button>
                            <button class="stab" role="tab" data-tab="securite" aria-selected="false">Sécurité</button>
                            <button class="stab" role="tab" data-tab="confidentialite"
                                aria-selected="false">Confidentialité</button>
                        </div>

                        <!-- PROFIL -->
                        <div class="stab-panel active" id="panel-profil">
                            <div class="settings-section">
                                <p class="settings-section-title">Informations personnelles</p>
                                <div style="display:flex;align-items:center;gap:1.25rem;margin-bottom:1.5rem">
                                    <div
                                        style="width:4rem;height:4rem;border-radius:50%;background:var(--clr-accent);display:flex;align-items:center;justify-content:center;font-size:1.25rem;font-weight:700;color:#fff;flex-shrink:0">
                                        KY</div>
                                    <div>
                                        <p style="font-weight:600">Konan Yves</p>
                                        <p style="font-size:.8125rem;color:var(--clr-muted-fg)">ETU-2024-0087 · L3
                                            Informatique</p>
                                    </div>
                                </div>
                                <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
                                    <div class="form-group"><label class="form-label"
                                            for="stuFirstName">Prénom</label><input class="form-input" type="text"
                                            id="stuFirstName" value="Yves" /></div>
                                    <div class="form-group"><label class="form-label"
                                            for="stuLastName">Nom</label><input class="form-input" type="text"
                                            id="stuLastName" value="Konan" /></div>
                                    <div class="form-group"><label class="form-label"
                                            for="stuEmail">E-mail</label><input class="form-input" type="email"
                                            id="stuEmail" value="yves.konan@etu.ufhb.ci" readonly
                                            style="background:var(--clr-muted)" /></div>
                                    <div class="form-group"><label class="form-label"
                                            for="stuPhone">Téléphone</label><input class="form-input" type="tel"
                                            id="stuPhone" value="+225 05 98 76 54" /></div>
                                </div>
                            </div>
                            <div class="settings-section" style="display:flex;justify-content:flex-end">
                                <button class="btn btn-primary">Enregistrer</button>
                            </div>
                        </div>

                        <!-- SECURITE -->
                        <div class="stab-panel" id="panel-securite">
                            <div class="settings-section">
                                <p class="settings-section-title">Changer mon mot de passe</p>
                                <div style="max-width:26rem;display:flex;flex-direction:column;gap:1rem">
                                    <div class="form-group"><label class="form-label" for="stuPwCur">Mot de passe
                                            actuel</label>
                                        <div class="input-wrapper has-icon-right"><input class="form-input"
                                                type="password" id="stuPwCur" /><button
                                                class="btn-icon input-icon-right" data-toggle-password="stuPwCur"
                                                aria-label="Voir/masquer"><svg class="icon" aria-hidden="true">
                                                    <use href="#ic-eye" />
                                                </svg></button></div>
                                    </div>
                                    <div class="form-group"><label class="form-label" for="stuPwNew">Nouveau mot de
                                            passe</label>
                                        <div class="input-wrapper has-icon-right"><input class="form-input"
                                                type="password" id="stuPwNew" minlength="8" /><button
                                                class="btn-icon input-icon-right" data-toggle-password="stuPwNew"
                                                aria-label="Voir/masquer"><svg class="icon" aria-hidden="true">
                                                    <use href="#ic-eye" />
                                                </svg></button></div>
                                    </div>
                                    <div class="form-group"><label class="form-label"
                                            for="stuPwConf">Confirmation</label>
                                        <div class="input-wrapper has-icon-right"><input class="form-input"
                                                type="password" id="stuPwConf" /><button
                                                class="btn-icon input-icon-right" data-toggle-password="stuPwConf"
                                                aria-label="Voir/masquer"><svg class="icon" aria-hidden="true">
                                                    <use href="#ic-eye" />
                                                </svg></button></div>
                                    </div>
                                    <button class="btn btn-primary" style="align-self:flex-start">Mettre à jour</button>
                                </div>
                            </div>
                        </div>

                        <!-- CONFIDENTIALITÉ -->
                        <div class="stab-panel" id="panel-confidentialite">
                            <div class="settings-section">
                                <p class="settings-section-title">Visibilité du profil</p>
                                <div style="display:flex;flex-direction:column;gap:1.25rem">
                                    <label style="display:flex;align-items:center;gap:.75rem;cursor:pointer"><input
                                            type="checkbox" checked
                                            style="width:1rem;height:1rem;accent-color:var(--clr-primary)" />
                                        <span>Permettre aux autres étudiants de voir mon rang</span></label>
                                    <label style="display:flex;align-items:center;gap:.75rem;cursor:pointer"><input
                                            type="checkbox"
                                            style="width:1rem;height:1rem;accent-color:var(--clr-primary)" />
                                        <span>Afficher ma moyenne sur le tableau de bord commun</span></label>
                                </div>
                            </div>
                            <div class="settings-section" style="display:flex;justify-content:flex-end">
                                <button class="btn btn-primary">Enregistrer</button>
                            </div>
                        </div>
                    </section>
                </div>
            </main>
        </div>
    </div>

    <script src="../assets/js/app.js"></script>
    <script>
        document.querySelectorAll('.stab').forEach(function (btn) {
            btn.addEventListener('click', function () {
                var tab = btn.dataset.tab;
                document.querySelectorAll('.stab').forEach(function (b) { b.classList.remove('active'); b.setAttribute('aria-selected', 'false'); });
                document.querySelectorAll('.stab-panel').forEach(function (p) { p.classList.remove('active'); });
                btn.classList.add('active'); btn.setAttribute('aria-selected', 'true');
                document.getElementById('panel-' + tab).classList.add('active');
            });
        });
    </script>
</body>

</html>
